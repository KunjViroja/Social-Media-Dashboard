version: '3.9'

services:
  # ─────────────────────────────────────────
  # MongoDB Service
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: smd_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: social_media_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - smd_network

  # ─────────────────────────────────────────
  # Redis Service
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: smd_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass redis_password_123
    volumes:
      - redis_data:/data
    networks:
      - smd_network

  # ─────────────────────────────────────────
  # Backend Service
  # ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smd_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/social_media_db?authSource=admin
      REDIS_URL: redis://:redis_password_123@redis:6379
      CLIENT_URL: http://localhost:5173
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - smd_network

  # ─────────────────────────────────────────
  # Frontend Service
  # ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smd_client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - smd_network

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  smd_network:
    driver: bridge
